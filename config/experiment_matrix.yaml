artifact:
  name: pqc-lorawan-exchange-repro-artifact
  version: '2.0'
  description: Reproducibility infrastructure for the frozen ns-3 scratch driver lpwan-pqc-export-exchanges.cc
simulator:
  entrypoint: lpwan-pqc-export-exchanges
  default_binary: ${SIM_BIN:-./build/scratch/ns3.47-lpwan-pqc-export-exchanges-default}
  base_args:
    environment: indoor
    variant: artifact
    simTimeS: 60
    periodMs: 500
    timeBase: start_to_start
    idleAfterExchangeMs: 0
    autoFragments: 'false'
    pk_fragments: 6
    ct_fragments: 9
    payloadBytes: 51
    g2gOverheadBytes: 28
    maxRetries: 2
    logicalChannels: 64
    usePerTable: 'false'
    validationMode: 'false'
    useLinkBudget: 'false'
    snrIndoorDb: -3.0
    snrOutdoorDb: 8.0
    bwHz: 125000
    crDen: 8
    cfoLambda: 0.0
    burstyModel: onoff-exp
    phaseOffsetMs: 0.0
    fixedGapMs: 0
    kTsym: 2.0
    gapMinMs: 0.0
    gapMaxMs: 50.0
    sfAwarePacingThreshold: 255
    retryMarginDb: 1.0
csv_contract:
  stable_header:
  - environment
  - sf
  - variant
  - validation_mode
  - snr_db
  - rx_dbm
  - margin_db
  - noise_dbm
  - pathloss_db
  - payload_bytes_config
  - payload_bytes_effective
  - g2g_overhead_bytes
  - phy_payload_bytes_frag_avg
  - pk_fragments
  - ct_fragments
  - fragment_gap_ms
  - n_fragments_exchange
  - ok_frags
  - fail_frags
  - per_observed
  - tx_airtime_ms_total
  - airtime_ms_frag_avg
  - exchange_latency_s
  - energy_j_exchange
  - energy_j_exchange_tx
  - energy_j_exchange_rx
  - airtime_energy_tx
  - airtime_energy_rx
  - energy_per_fragment_tx
  - energy_per_fragment_rx
  - lambda_eff
  - is_on
  - attempts_total
  - attempts_on
  - attempts_off
  - attempts_off_fraction
  - lambda_eff_attempt_avg
  - per_fragment_avg
  - per_collision_sim_avg
  - per_collision_th_avg
  - per_channel_avg
  - per_total_avg
  - pacing_mode
  - sf_aware_pacing_threshold
  - retry_margin_db
  - rx_duty_cycle_enabled
  - rx_window_ms
  - rx_idle_ms
  - ack_batch_size
  - data_frames_tx
  - ack_frames_tx
  - frames_tx_total
  - ack_airtime_ms
  - ack_logical_failures
  - lost_ack_sleep
  - lost_ack_channel
  - ack_batch_retx_rounds
  - ack_per_channel_avg
  - ack_per_collision_avg
  - ack_per_total_avg
  - lost_rx_sleep_data
  - lost_rx_sleep_ack
  - per_exchange_fail
  - retransmissions_count
  artifact_added_columns:
  - campaign
  - run_id
  - seed
  - run
  - lambda_total
  - logical_channels
  - bursty_enabled
  - on_mean_ms
  - off_mean_ms
  - use_explicit_event_collisions
  - offered_load_eps
  - pacing_strategy
sweeps:
  sf:
  - 7
  - 8
  - 9
  - 10
  - 11
  - 12
  lambda_total:
  - 0.0
  - 0.05
  - 0.1
  - 0.2
  - 0.4
  - 0.8
  pacing:
  - baseline
  - radioaware
  - radioaware_phase_bounded
  ack_batch_size:
  - 1
  - 2
  - 4
  - 8
  rx_window_ms:
  - 50
  - 100
  - 200
  - 400
  rx_idle_ms:
  - 0
  - 100
  - 400
  - 900
  on_mean_ms:
  - 200
  - 500
  - 1000
  off_mean_ms:
  - 800
  - 2000
  - 5000
  seeds:
  - 101
  - 202
  - 303
  - 404
  - 505
campaigns:
  baseline:
    description: Nominal operation without burstiness or RX sleeping; collision load
      swept through lambdaTotal.
    selector:
      sf:
      - 7
      - 9
      - 12
      lambda_total:
      - 0.0
      - 0.05
      - 0.1
      - 0.2
      - 0.4
      pacing:
      - baseline
      - radioaware
      - radioaware_phase_bounded
      ack_batch_size:
      - 1
      rx_window_ms:
      - 200
      rx_idle_ms:
      - 0
      bursty_enabled:
      - false
      use_explicit_event_collisions:
      - false
      seeds:
      - 101
      - 202
      - 303
      - 404
      - 505
  bursty:
    description: ON/OFF bursty interference sensitivity with analytical collision
      probability mode.
    selector:
      sf:
      - 7
      - 9
      - 12
      lambda_total:
      - 0.1
      - 0.2
      - 0.4
      pacing:
      - baseline
      - radioaware_phase_bounded
      ack_batch_size:
      - 1
      - 4
      rx_window_ms:
      - 200
      rx_idle_ms:
      - 0
      bursty_enabled:
      - true
      on_mean_ms:
      - 200
      - 500
      - 1000
      off_mean_ms:
      - 800
      - 2000
      - 5000
      use_explicit_event_collisions:
      - false
      seeds:
      - 101
      - 202
      - 303
      - 404
      - 505
  collisions:
    description: Analytical-versus-explicit collision stress tests across load and
      spreading factor.
    selector:
      sf:
      - 7
      - 8
      - 9
      - 10
      - 11
      - 12
      lambda_total:
      - 0.05
      - 0.1
      - 0.2
      - 0.4
      - 0.8
      pacing:
      - baseline
      - radioaware_phase_bounded
      ack_batch_size:
      - 1
      - 4
      rx_window_ms:
      - 200
      rx_idle_ms:
      - 0
      bursty_enabled:
      - false
      use_explicit_event_collisions:
      - false
      - true
      seeds:
      - 101
      - 202
      - 303
      - 404
      - 505
  rxsleep:
    description: Deterministic receiver availability sweeps under moderate offered
      load.
    selector:
      sf:
      - 7
      - 9
      - 12
      lambda_total:
      - 0.1
      - 0.2
      pacing:
      - baseline
      - radioaware_phase_bounded
      ack_batch_size:
      - 1
      - 4
      rx_window_ms:
      - 50
      - 100
      - 200
      - 400
      rx_idle_ms:
      - 100
      - 400
      - 900
      bursty_enabled:
      - false
      use_explicit_event_collisions:
      - false
      seeds:
      - 101
      - 202
      - 303
      - 404
      - 505
  ackbatch:
    description: ACK batching trade-off under moderate and high load, with and without
      RX sleep.
    selector:
      sf:
      - 7
      - 9
      - 12
      lambda_total:
      - 0.1
      - 0.2
      - 0.4
      pacing:
      - baseline
      - radioaware_phase_bounded
      ack_batch_size:
      - 1
      - 2
      - 4
      - 8
      rx_window_ms:
      - 200
      rx_idle_ms:
      - 0
      - 400
      bursty_enabled:
      - false
      use_explicit_event_collisions:
      - false
      seeds:
      - 101
      - 202
      - 303
      - 404
      - 505
